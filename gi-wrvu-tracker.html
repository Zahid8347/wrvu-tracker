<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="wRVU Tracker"/>
  <meta name="theme-color" content="#1e3a5f"/>
  <title>GI wRVU Tracker</title>

  <!-- PWA icon placeholder (Safari uses this for home screen) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e3a5f'/><text y='.9em' font-size='70' x='10'>🩺</text></svg>"/>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f1f5f9; }
    select, input, button { font-family: inherit; }
    /* prevent iOS zoom on input focus */
    input, select { font-size: 16px !important; }
    @media (max-width: 500px) {
      .hide-mobile { display: none !important; }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ── CPT reference data (2026 CMS wRVU values) ─────────────────────────
    const CPT_DATA = [
      { cat: "EGD",         code: "43235", desc: "EGD – Diagnostic",               wrvu: 2.50 },
      { cat: "EGD",         code: "43239", desc: "EGD – w/ Biopsy",                wrvu: 2.92 },
      { cat: "EGD",         code: "43249", desc: "EGD – Balloon Dilation (TTS)",    wrvu: 3.25 },
      { cat: "EGD",         code: "43245", desc: "EGD – Savary/Bougie Dilation",    wrvu: 3.12 },
      { cat: "EGD",         code: "43251", desc: "EGD – w/ Polypectomy (snare)",    wrvu: 3.50 },
      { cat: "EGD",         code: "43270", desc: "EGD – w/ Ablation (APC/RFA)",     wrvu: 4.00 },
      { cat: "EGD",         code: "43247", desc: "EGD – Foreign Body Removal",      wrvu: 3.25 },
      { cat: "EGD",         code: "43255", desc: "EGD – w/ Hemostasis",             wrvu: 3.50 },
      { cat: "EGD",         code: "43246", desc: "PEG Tube Placement",              wrvu: 5.00 },
      { cat: "Colonoscopy", code: "45378", desc: "Colonoscopy – Diagnostic",        wrvu: 3.36 },
      { cat: "Colonoscopy", code: "45380", desc: "Colonoscopy – w/ Biopsy",         wrvu: 4.43 },
      { cat: "Colonoscopy", code: "45385", desc: "Colonoscopy – w/ Polypectomy",    wrvu: 4.57 },
      { cat: "Colonoscopy", code: "45388", desc: "Colonoscopy – w/ Ablation (APC)", wrvu: 4.75 },
      { cat: "Colonoscopy", code: "45390", desc: "Colonoscopy – w/ EMR",            wrvu: 5.50 },
      { cat: "Colonoscopy", code: "45381", desc: "Colonoscopy – Submucosal Inj",    wrvu: 4.00 },
      { cat: "Colonoscopy", code: "G0105", desc: "Screening Colo – High Risk",      wrvu: 3.36 },
      { cat: "Colonoscopy", code: "G0121", desc: "Screening Colo – Avg Risk",       wrvu: 3.36 },
      { cat: "ERCP",        code: "43260", desc: "ERCP – Diagnostic",               wrvu: 5.50 },
      { cat: "ERCP",        code: "43262", desc: "ERCP – w/ Sphincterotomy",        wrvu: 7.80 },
      { cat: "ERCP",        code: "43264", desc: "ERCP – w/ Stone Removal",         wrvu: 8.50 },
      { cat: "ERCP",        code: "43274", desc: "ERCP – w/ Stent Placement",       wrvu: 9.25 },
      { cat: "ERCP",        code: "43275", desc: "ERCP – Stent Removal/Exchange",   wrvu: 7.50 },
      { cat: "ERCP",        code: "43273", desc: "ERCP – Cholangioscopy (add-on)",  wrvu: 3.01 },
    ];

    const CAT_COLORS = { EGD: "#2563eb", Colonoscopy: "#059669", ERCP: "#d97706" };
    const CAT_BG     = { EGD: "#eff6ff", Colonoscopy: "#ecfdf5", ERCP: "#fffbeb" };
    const MONTHS     = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const STORAGE_KEY = "gi-wrvu-cases-v2";
    const API_KEY_STORAGE = "gi-wrvu-apikey";

    function todayStr() { return new Date().toISOString().slice(0,10); }
    function uid()      { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

    function monthKey(dateStr) {
      const d = new Date(dateStr + "T12:00:00");
      return `${d.getFullYear()}-${String(d.getMonth()).padStart(2,"0")}`;
    }
    function monthLabel(key) {
      const [y, m] = key.split("-");
      return `${MONTHS[parseInt(m)]} ${y}`;
    }

    function newCase(date = todayStr()) {
      return { id: uid(), date, patient: "", note: "", procs: [{ id: uid(), code: "45385" }] };
    }
    function caseWRVU(c) {
      return c.procs.reduce((sum, p) => {
        const cpt = CPT_DATA.find(x => x.code === p.code);
        return sum + (cpt ? cpt.wrvu : 0);
      }, 0);
    }

    // ── localStorage persistence (replaces window.storage for standalone use) ──
    function lsLoad() {
      try { const v = localStorage.getItem(STORAGE_KEY); return v ? JSON.parse(v) : []; }
      catch { return []; }
    }
    function lsSave(data) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); return true; }
      catch { return false; }
    }
    function lsLoadKey() {
      try { return localStorage.getItem(API_KEY_STORAGE) || ""; } catch { return ""; }
    }
    function lsSaveKey(k) {
      try { localStorage.setItem(API_KEY_STORAGE, k); } catch {}
    }

    // ── Sub-components ─────────────────────────────────────────────────────
    function CPTSelect({ value, onChange, style }) {
      return (
        <select value={value} onChange={e => onChange(e.target.value)} style={style}>
          {["EGD","Colonoscopy","ERCP"].map(cat => (
            <optgroup key={cat} label={`── ${cat} ──`}>
              {CPT_DATA.filter(c => c.cat === cat).map(c => (
                <option key={c.code} value={c.code}>{c.code} — {c.desc} ({c.wrvu} wRVU)</option>
              ))}
            </optgroup>
          ))}
        </select>
      );
    }

    function ProcRow({ proc, onChange, onRemove, showRemove }) {
      const cpt = CPT_DATA.find(c => c.code === proc.code);
      const sel = { width:"100%", padding:"8px 10px", border:"1px solid #e5e7eb", borderRadius:8,
                    borderLeft: cpt ? `3px solid ${CAT_COLORS[cpt.cat]}` : "3px solid #e5e7eb" };
      return (
        <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:8 }}>
          <div style={{ flex:1 }}>
            <CPTSelect value={proc.code} onChange={onChange} style={sel} />
          </div>
          {cpt && (
            <div style={{ whiteSpace:"nowrap", fontWeight:800, fontSize:15, color:CAT_COLORS[cpt.cat], minWidth:52, textAlign:"right" }}>
              {cpt.wrvu.toFixed(2)}
            </div>
          )}
          {showRemove && (
            <button onClick={onRemove}
              style={{ background:"none", border:"none", color:"#d1d5db", cursor:"pointer", fontSize:22, lineHeight:1, padding:"0 4px" }}>×</button>
          )}
        </div>
      );
    }

    // ── Main App ───────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab]                           = useState("log");
      const [cases, setCasesRaw]                    = useState(() => lsLoad());
      const [saveStatus, setSaveStatus]             = useState("");
      const [draftCase, setDraftCase]               = useState(newCase());
      const [loading, setLoading]                   = useState(false);
      const [aiMsg, setAiMsg]                       = useState("");
      const [pendingCases, setPendingCases]         = useState([]);
      const [expandedMonths, setExpanded]           = useState({});
      const [showClearConfirm, setShowClearConfirm] = useState(false);
      const [editingCase, setEditingCase]           = useState(null);
      const [apiKey, setApiKey]                     = useState(() => lsLoadKey());
      const [showApiKey, setShowApiKey]             = useState(false);
      const [apiKeyInput, setApiKeyInput]           = useState(() => lsLoadKey());

      const fileRef   = useRef();
      const importRef = useRef();

      const inputSt = { width:"100%", padding:"10px 12px", border:"1px solid #e5e7eb", borderRadius:8 };

      // Wrap setCases to also persist
      function setCases(updater) {
        setCasesRaw(prev => {
          const next = typeof updater === "function" ? updater(prev) : updater;
          const ok = lsSave(next);
          setSaveStatus(ok ? "saved" : "error");
          setTimeout(() => setSaveStatus(""), 2000);
          return next;
        });
      }

      // ── Export / Import / Clear ──
      function exportJSON() {
        const blob = new Blob([JSON.stringify(cases, null, 2)], { type:"application/json" });
        const a = Object.assign(document.createElement("a"), {
          href: URL.createObjectURL(blob),
          download: `gi-wrvu-backup-${todayStr()}.json`
        });
        a.click();
      }
      function handleImport(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(reader.result);
            if (Array.isArray(parsed)) {
              setCases(prev => {
                const ids = new Set(prev.map(x => x.id));
                return [...prev, ...parsed.filter(x => !ids.has(x.id))];
              });
            }
          } catch {}
        };
        reader.readAsText(file); e.target.value = "";
      }
      function clearAll() {
        setCases([]); setShowClearConfirm(false);
      }

      // ── Draft helpers ──
      const updDraft     = upd => setDraftCase(dc => ({...dc, ...upd}));
      const setDraftProc = (pid, code) => setDraftCase(dc => ({...dc, procs: dc.procs.map(p => p.id===pid ? {...p,code} : p)}));
      const addDraftProc = ()  => setDraftCase(dc => ({...dc, procs: [...dc.procs, {id:uid(), code:"45378"}]}));
      const remDraftProc = pid => setDraftCase(dc => ({...dc, procs: dc.procs.filter(p => p.id!==pid)}));
      function commitDraft() {
        if (!draftCase.patient.trim()) return;
        setCases(prev => [draftCase, ...prev]);
        setDraftCase(newCase(draftCase.date));
      }
      const removeCase = id => setCases(prev => prev.filter(c => c.id!==id));

      // ── Edit helpers ──
      const startEdit    = c    => setEditingCase(JSON.parse(JSON.stringify(c)));
      const setEditProc  = (pid, code) => setEditingCase(ec => ({...ec, procs: ec.procs.map(p => p.id===pid ? {...p,code} : p)}));
      const addEditProc  = ()   => setEditingCase(ec => ({...ec, procs: [...ec.procs, {id:uid(), code:"45378"}]}));
      const remEditProc  = pid  => setEditingCase(ec => ({...ec, procs: ec.procs.filter(p => p.id!==pid)}));
      function saveEdit() {
        setCases(prev => prev.map(c => c.id===editingCase.id ? editingCase : c));
        setEditingCase(null);
      }

      // ── AI Photo ──
      async function handleFile(e) {
        const file = e.target.files[0]; if (!file) return;
        if (!apiKey) { setAiMsg("⚠️ Please enter your Anthropic API key in Settings first."); setTab("photo"); return; }
        setLoading(true); setAiMsg(""); setPendingCases([]);
        const reader = new FileReader();
        reader.onload = async () => {
          const b64 = reader.result.split(",")[1];
          try {
            const res = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "x-api-key": apiKey,
                "anthropic-version": "2023-06-01",
                "anthropic-dangerous-direct-browser-access": "true"
              },
              body: JSON.stringify({
                model: "claude-opus-4-5",
                max_tokens: 2000,
                messages: [{
                  role: "user",
                  content: [
                    { type:"image", source:{ type:"base64", media_type: file.type||"image/jpeg", data: b64 } },
                    { type:"text", text:`This is a gastroenterologist's patient schedule or roster. Extract every patient on the list.

For each patient return a JSON object with ONLY:
  "name": the patient name or MRN/identifier exactly as written
  "note": any brief annotation next to the patient (room, time, "EGD", "colo", "ERCP", physician, etc) — copy verbatim, do NOT assign CPT codes

Respond ONLY with a raw JSON array, no markdown. Example:
[{"name":"Smith, John","note":"EGD 8am"},{"name":"Doe, Jane","note":"ERCP"},{"name":"MRN 4821903","note":""}]` }
                  ]
                }]
              })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error.message);
            const text = (data.content||[]).map(b => b.text||"").join("");
            const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
            setPendingCases(parsed.map(p => ({
              id: uid(), date: todayStr(),
              patient: p.name||"", note: p.note||"",
              selected: true,
              procs: [{id:uid(), code:"45378"}]
            })));
            setAiMsg(`✅ Found ${parsed.length} patient(s) — review and confirm below.`);
          } catch(err) {
            setAiMsg(`⚠️ Error: ${err.message || "Couldn't read the image. Check your API key and try again."}`);
          }
          setLoading(false);
        };
        reader.readAsDataURL(file); e.target.value="";
      }

      function confirmPending() {
        const toAdd = pendingCases.filter(p => p.selected)
          .map(p => ({id:p.id, date:p.date, patient:p.patient, note:p.note,
                       procs:p.procs.map(pr => ({id:pr.id, code:pr.code}))}));
        setCases(prev => [...toAdd, ...prev]);
        setPendingCases([]); setAiMsg(""); setTab("log");
      }

      // ── Aggregation ──
      const allProcs   = cases.flatMap(c => c.procs.map(p => {
        const cpt = CPT_DATA.find(x=>x.code===p.code);
        return {...p, cat:cpt?.cat||"?", wrvu:cpt?.wrvu||0};
      }));
      const grandTotal = allProcs.reduce((s,p)=>s+p.wrvu, 0);
      const byMonth    = {};
      cases.forEach(c => { const k=monthKey(c.date); if(!byMonth[k]) byMonth[k]=[]; byMonth[k].push(c); });
      const monthKeys  = Object.keys(byMonth).sort().reverse();

      const tabBtn = t => ({
        padding:"9px 14px", border:"none", borderRadius:8, cursor:"pointer",
        fontWeight: tab===t ? 700 : 500, fontSize:13,
        background: tab===t ? "#1e3a5f" : "white",
        color: tab===t ? "white" : "#4b5563",
        boxShadow:"0 1px 3px rgba(0,0,0,.1)",
        WebkitTapHighlightColor:"transparent"
      });

      return (
        <div style={{ background:"#f1f5f9", minHeight:"100vh", padding:"12px 12px 40px" }}>
          <div style={{ maxWidth:860, margin:"0 auto" }}>

            {/* ── CLEAR MODAL ── */}
            {showClearConfirm && (
              <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.55)", zIndex:999, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
                <div style={{ background:"white", borderRadius:16, padding:28, maxWidth:320, width:"100%", textAlign:"center" }}>
                  <div style={{ fontSize:48 }}>⚠️</div>
                  <h3 style={{ margin:"10px 0 6px" }}>Clear All Data?</h3>
                  <p style={{ color:"#6b7280", fontSize:14, margin:"0 0 22px" }}>Permanently deletes all {cases.length} cases. Export a backup first.</p>
                  <div style={{ display:"flex", gap:10 }}>
                    <button onClick={()=>setShowClearConfirm(false)} style={{ flex:1, padding:12, background:"#f3f4f6", border:"none", borderRadius:8, fontWeight:600, fontSize:15, cursor:"pointer" }}>Cancel</button>
                    <button onClick={clearAll} style={{ flex:1, padding:12, background:"#ef4444", color:"white", border:"none", borderRadius:8, fontWeight:700, fontSize:15, cursor:"pointer" }}>Delete All</button>
                  </div>
                </div>
              </div>
            )}

            {/* ── EDIT MODAL ── */}
            {editingCase && (
              <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.55)", zIndex:999, display:"flex", alignItems:"flex-end", justifyContent:"center", padding:0 }}>
                <div style={{ background:"white", borderRadius:"16px 16px 0 0", padding:24, width:"100%", maxWidth:600, maxHeight:"90vh", overflowY:"auto" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                    <h3 style={{ margin:0, color:"#1e3a5f" }}>Edit Case</h3>
                    <button onClick={()=>setEditingCase(null)} style={{ background:"none", border:"none", fontSize:24, color:"#9ca3af", cursor:"pointer" }}>×</button>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
                    <div>
                      <label style={{ fontSize:11, fontWeight:700, color:"#6b7280", display:"block", marginBottom:4 }}>DATE</label>
                      <input type="date" value={editingCase.date} onChange={e=>setEditingCase(ec=>({...ec,date:e.target.value}))} style={inputSt} />
                    </div>
                    <div>
                      <label style={{ fontSize:11, fontWeight:700, color:"#6b7280", display:"block", marginBottom:4 }}>PATIENT</label>
                      <input value={editingCase.patient} onChange={e=>setEditingCase(ec=>({...ec,patient:e.target.value}))} style={inputSt} />
                    </div>
                    <div style={{ gridColumn:"span 2" }}>
                      <label style={{ fontSize:11, fontWeight:700, color:"#6b7280", display:"block", marginBottom:4 }}>NOTE</label>
                      <input value={editingCase.note} onChange={e=>setEditingCase(ec=>({...ec,note:e.target.value}))} style={inputSt} />
                    </div>
                  </div>
                  <label style={{ fontSize:11, fontWeight:700, color:"#6b7280", display:"block", marginBottom:8 }}>PROCEDURES</label>
                  {editingCase.procs.map(p => (
                    <ProcRow key={p.id} proc={p}
                      onChange={code=>setEditProc(p.id,code)}
                      onRemove={()=>remEditProc(p.id)}
                      showRemove={editingCase.procs.length>1} />
                  ))}
                  <button onClick={addEditProc}
                    style={{ width:"100%", padding:"9px", background:"#f8fafc", border:"1px dashed #cbd5e1", borderRadius:8, cursor:"pointer", color:"#64748b", fontWeight:600, fontSize:14, marginBottom:14 }}>
                    + Add Another Procedure
                  </button>
                  <div style={{ background:"#f0f9ff", borderRadius:8, padding:"10px 14px", display:"flex", justifyContent:"space-between", marginBottom:16 }}>
                    <span style={{ color:"#1e40af", fontWeight:600 }}>{editingCase.procs.length} procedure{editingCase.procs.length>1?"s":""}</span>
                    <span style={{ fontWeight:900, color:"#1e3a5f", fontSize:18 }}>{caseWRVU(editingCase).toFixed(2)} wRVU</span>
                  </div>
                  <button onClick={saveEdit}
                    style={{ width:"100%", padding:13, background:"#1e3a5f", color:"white", border:"none", borderRadius:8, fontWeight:700, fontSize:16, cursor:"pointer" }}>
                    Save Changes
                  </button>
                </div>
              </div>
            )}

            {/* ── API KEY MODAL ── */}
            {showApiKey && (
              <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.55)", zIndex:999, display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
                <div style={{ background:"white", borderRadius:"16px 16px 0 0", padding:24, width:"100%", maxWidth:600 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                    <h3 style={{ margin:0, color:"#1e3a5f" }}>Anthropic API Key</h3>
                    <button onClick={()=>setShowApiKey(false)} style={{ background:"none", border:"none", fontSize:24, color:"#9ca3af", cursor:"pointer" }}>×</button>
                  </div>
                  <p style={{ color:"#6b7280", fontSize:13, margin:"0 0 14px", lineHeight:1.6 }}>
                    Required for the 📷 Upload List feature. Get a key at <strong>console.anthropic.com</strong>.
                    Your key is stored only on this device (localStorage). It is never sent anywhere except directly to Anthropic's API.
                  </p>
                  <input
                    type="password"
                    placeholder="sk-ant-..."
                    value={apiKeyInput}
                    onChange={e=>setApiKeyInput(e.target.value)}
                    style={{ ...inputSt, marginBottom:12, fontFamily:"monospace" }}
                  />
                  <button onClick={()=>{ lsSaveKey(apiKeyInput); setApiKey(apiKeyInput); setShowApiKey(false); }}
                    style={{ width:"100%", padding:13, background:"#1e3a5f", color:"white", border:"none", borderRadius:8, fontWeight:700, fontSize:16, cursor:"pointer" }}>
                    Save Key
                  </button>
                </div>
              </div>
            )}

            {/* ── HEADER ── */}
            <div style={{ background:"linear-gradient(135deg,#1e3a5f,#2563eb)", borderRadius:14, padding:"18px 18px 16px", marginBottom:14, color:"white" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:4 }}>
                <h1 style={{ margin:0, fontSize:20, fontWeight:800 }}>🩺 GI wRVU Tracker</h1>
                <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                  {saveStatus==="saved" && <span style={{ fontSize:11, background:"rgba(255,255,255,.2)", padding:"3px 8px", borderRadius:10 }}>✅ Saved</span>}
                  {saveStatus==="error" && <span style={{ fontSize:11, background:"rgba(239,68,68,.4)", padding:"3px 8px", borderRadius:10 }}>⚠️ Error</span>}
                  <button onClick={()=>setShowApiKey(true)}
                    style={{ background:"rgba(255,255,255,.2)", border:"1px solid rgba(255,255,255,.3)", borderRadius:6, color:"white", fontSize:12, padding:"4px 10px", cursor:"pointer", fontWeight:600 }}>
                    ⚙️ API Key
                  </button>
                </div>
              </div>
              <p style={{ margin:"0 0 12px", opacity:.8, fontSize:12 }}>EGD · Colonoscopy · ERCP — 2026 CMS wRVU Values</p>
              <div style={{ display:"flex", gap:7, marginBottom:14, flexWrap:"wrap" }}>
                <button onClick={exportJSON} style={{ padding:"5px 11px", background:"rgba(255,255,255,.2)", border:"1px solid rgba(255,255,255,.3)", borderRadius:6, color:"white", fontSize:12, cursor:"pointer", fontWeight:600 }}>⬇ Export</button>
                <button onClick={()=>importRef.current.click()} style={{ padding:"5px 11px", background:"rgba(255,255,255,.2)", border:"1px solid rgba(255,255,255,.3)", borderRadius:6, color:"white", fontSize:12, cursor:"pointer", fontWeight:600 }}>⬆ Import</button>
                <button onClick={()=>setShowClearConfirm(true)} style={{ padding:"5px 11px", background:"rgba(239,68,68,.3)", border:"1px solid rgba(239,68,68,.5)", borderRadius:6, color:"white", fontSize:12, cursor:"pointer", fontWeight:600 }}>🗑 Clear</button>
                <input ref={importRef} type="file" accept=".json" onChange={handleImport} style={{ display:"none" }} />
              </div>
              <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                {[["Total wRVU", grandTotal.toFixed(2)],["Cases",cases.length],["Procedures",allProcs.length],["Months",monthKeys.length]].map(([l,v])=>(
                  <div key={l} style={{ background:"rgba(255,255,255,.15)", borderRadius:9, padding:"8px 14px", textAlign:"center" }}>
                    <div style={{ fontSize:20, fontWeight:800 }}>{v}</div>
                    <div style={{ fontSize:10, opacity:.85 }}>{l}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* ── TABS ── */}
            <div style={{ display:"flex", gap:7, marginBottom:14, flexWrap:"wrap" }}>
              {[["log","📋 Log"],["photo","📷 Upload"],["summary","📊 Summary"],["codes","📖 CPT"]].map(([id,label])=>(
                <button key={id} style={tabBtn(id)} onClick={()=>setTab(id)}>{label}</button>
              ))}
            </div>

            {/* ══════════ LOG ENTRY ══════════ */}
            {tab==="log" && (
              <>
                <div style={{ background:"white", borderRadius:12, padding:18, boxShadow:"0 1px 4px rgba(0,0,0,.07)", marginBottom:14 }}>
                  <h3 style={{ margin:"0 0 14px", fontSize:15, color:"#1e3a5f" }}>Add Patient Case</h3>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
                    <div>
                      <label style={{ fontSize:11, fontWeight:700, color:"#6b7280", display:"block", marginBottom:4 }}>DATE</label>
                      <input type="date" value={draftCase.date} onChange={e=>updDraft({date:e.target.value})} style={inputSt} />
                    </div>
                    <div>
                      <label style={{ fontSize:11, fontWeight:700, color:"#6b7280", display:"block", marginBottom:4 }}>PATIENT / MRN</label>
                      <input placeholder="Smith, John" value={draftCase.patient} onChange={e=>updDraft({patient:e.target.value})} style={inputSt} />
                    </div>
                    <div style={{ gridColumn:"span 2" }}>
                      <label style={{ fontSize:11, fontWeight:700, color:"#6b7280", display:"block", marginBottom:4 }}>NOTE (optional)</label>
                      <input placeholder="cecum reached, 10mm polyp, jaundice…" value={draftCase.note} onChange={e=>updDraft({note:e.target.value})} style={inputSt} />
                    </div>
                  </div>

                  <label style={{ fontSize:11, fontWeight:700, color:"#6b7280", display:"block", marginBottom:8 }}>PROCEDURES</label>
                  {draftCase.procs.map(p=>(
                    <ProcRow key={p.id} proc={p}
                      onChange={code=>setDraftProc(p.id,code)}
                      onRemove={()=>remDraftProc(p.id)}
                      showRemove={draftCase.procs.length>1} />
                  ))}
                  <button onClick={addDraftProc}
                    style={{ width:"100%", padding:"9px", background:"#f8fafc", border:"1px dashed #cbd5e1", borderRadius:8, cursor:"pointer", color:"#64748b", fontWeight:600, fontSize:14, marginBottom:12 }}>
                    + Add Another Procedure
                  </button>

                  <div style={{ padding:"10px 14px", background:"#f0f9ff", borderRadius:8, display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, borderLeft:"4px solid #2563eb" }}>
                    <span style={{ fontSize:13, color:"#1e40af", fontWeight:600 }}>
                      {draftCase.procs.map(p=>CPT_DATA.find(x=>x.code===p.code)?.code||"?").join(" + ")}
                    </span>
                    <span style={{ fontSize:22, fontWeight:900, color:"#1e3a5f" }}>{caseWRVU(draftCase).toFixed(2)} wRVU</span>
                  </div>

                  <button onClick={commitDraft}
                    style={{ width:"100%", padding:13, background:"#1e3a5f", color:"white", border:"none", borderRadius:8, fontWeight:700, fontSize:16, cursor:"pointer" }}>
                    + Save Case to Log
                  </button>
                </div>

                {cases.length===0 ? (
                  <div style={{ textAlign:"center", padding:"40px 20px", color:"#9ca3af", background:"white", borderRadius:12 }}>
                    <div style={{ fontSize:48 }}>📋</div>
                    <p style={{ marginTop:8, fontSize:15 }}>No cases logged yet.<br/>Add manually above or upload a patient list photo.</p>
                  </div>
                ) : (
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {cases.map(c=>{
                      const total=caseWRVU(c);
                      return (
                        <div key={c.id} style={{ background:"white", borderRadius:12, padding:"14px 16px", boxShadow:"0 1px 4px rgba(0,0,0,.07)" }}>
                          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
                            <div style={{ flex:1, minWidth:0 }}>
                              <span style={{ fontWeight:700, fontSize:15 }}>{c.patient||"—"}</span>
                              <span style={{ marginLeft:8, color:"#9ca3af", fontSize:12 }}>{c.date}</span>
                              {c.note && <div style={{ color:"#6b7280", fontSize:12, marginTop:2 }}>{c.note}</div>}
                            </div>
                            <div style={{ display:"flex", alignItems:"center", gap:8, marginLeft:10 }}>
                              <span style={{ fontWeight:900, fontSize:16, color:"#1e3a5f", whiteSpace:"nowrap" }}>{total.toFixed(2)} wRVU</span>
                              <button onClick={()=>startEdit(c)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:16, padding:"2px 4px", opacity:.6 }}>✏️</button>
                              <button onClick={()=>removeCase(c.id)} style={{ background:"none", border:"none", color:"#d1d5db", cursor:"pointer", fontSize:22, lineHeight:1, padding:"0 2px" }}>×</button>
                            </div>
                          </div>
                          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                            {c.procs.map(p=>{
                              const cpt=CPT_DATA.find(x=>x.code===p.code);
                              return cpt ? (
                                <span key={p.id} style={{ background:CAT_BG[cpt.cat], color:CAT_COLORS[cpt.cat], padding:"3px 10px", borderRadius:12, fontSize:12, fontWeight:600 }}>
                                  {cpt.code} · {cpt.wrvu.toFixed(2)}
                                </span>
                              ) : null;
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </>
            )}

            {/* ══════════ PHOTO UPLOAD ══════════ */}
            {tab==="photo" && (
              <>
                {!apiKey && (
                  <div style={{ background:"#fef3c7", border:"1px solid #fcd34d", borderRadius:10, padding:"12px 16px", marginBottom:14, fontSize:14, color:"#78350f" }}>
                    <strong>API Key Required:</strong> Tap <strong>⚙️ API Key</strong> in the header to enter your Anthropic API key before using this feature.
                  </div>
                )}
                <div style={{ background:"white", borderRadius:12, padding:24, boxShadow:"0 1px 4px rgba(0,0,0,.07)", textAlign:"center", marginBottom:14 }}>
                  <div style={{ fontSize:52, marginBottom:10 }}>📷</div>
                  <h3 style={{ margin:"0 0 8px", fontSize:17 }}>Upload Your Patient List</h3>
                  <p style={{ color:"#6b7280", fontSize:14, margin:"0 0 20px", lineHeight:1.7 }}>
                    Snap a photo of your patient schedule. Claude AI reads every name and identifier. <strong>You assign the CPT codes.</strong>
                  </p>
                  <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{ display:"none" }} />
                  <div style={{ display:"flex", gap:12, justifyContent:"center" }}>
                    <button onClick={()=>{fileRef.current.removeAttribute("capture");fileRef.current.click();}}
                      style={{ padding:"12px 20px", background:"#f3f4f6", border:"1px solid #e5e7eb", borderRadius:8, cursor:"pointer", fontWeight:600, fontSize:15 }}>📁 Choose File</button>
                    <button onClick={()=>{fileRef.current.setAttribute("capture","environment");fileRef.current.click();}}
                      style={{ padding:"12px 20px", background:"#1e3a5f", color:"white", border:"none", borderRadius:8, cursor:"pointer", fontWeight:600, fontSize:15 }}>📷 Take Photo</button>
                  </div>
                  {loading && <div style={{ marginTop:18, color:"#2563eb", fontWeight:600, fontSize:15 }}>⏳ Reading patient list with AI…</div>}
                  {aiMsg && (
                    <div style={{ marginTop:14, padding:"10px 16px", background:aiMsg.startsWith("✅")?"#ecfdf5":"#fef2f2", color:aiMsg.startsWith("✅")?"#065f46":"#991b1b", borderRadius:8, fontSize:14, fontWeight:500 }}>
                      {aiMsg}
                    </div>
                  )}
                </div>

                {pendingCases.length>0 && (
                  <div style={{ background:"white", borderRadius:12, padding:18, boxShadow:"0 1px 4px rgba(0,0,0,.07)" }}>
                    <h3 style={{ margin:"0 0 6px", fontSize:15 }}>Review Detected Patients</h3>
                    <p style={{ margin:"0 0 16px", color:"#6b7280", fontSize:13 }}>Set the date and assign CPT codes, then confirm.</p>
                    {pendingCases.map((p,pi)=>(
                      <div key={p.id} style={{ border:"1px solid #e5e7eb", borderRadius:10, padding:14, marginBottom:14, opacity:p.selected?1:.4 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                          <input type="checkbox" checked={p.selected}
                            onChange={e=>setPendingCases(prev=>prev.map((x,j)=>j===pi?{...x,selected:e.target.checked}:x))}
                            style={{ width:18, height:18 }} />
                          <div style={{ flex:1 }}>
                            <div style={{ fontWeight:700, fontSize:14 }}>{p.patient}</div>
                            {p.note && <div style={{ color:"#6b7280", fontSize:12 }}>{p.note}</div>}
                          </div>
                          <span style={{ fontWeight:800, color:"#1e3a5f", fontSize:14 }}>
                            {p.procs.reduce((s,pr)=>s+(CPT_DATA.find(x=>x.code===pr.code)?.wrvu||0),0).toFixed(2)} wRVU
                          </span>
                        </div>
                        <div style={{ marginBottom:10 }}>
                          <label style={{ fontSize:11, fontWeight:700, color:"#6b7280", display:"block", marginBottom:4 }}>DATE</label>
                          <input type="date" value={p.date}
                            onChange={e=>setPendingCases(prev=>prev.map((x,j)=>j===pi?{...x,date:e.target.value}:x))}
                            style={{ ...inputSt, width:"auto" }} />
                        </div>
                        <label style={{ fontSize:11, fontWeight:700, color:"#6b7280", display:"block", marginBottom:8 }}>PROCEDURES</label>
                        {p.procs.map((pr,pri)=>{
                          const cpt=CPT_DATA.find(x=>x.code===pr.code);
                          return (
                            <div key={pr.id} style={{ display:"flex", gap:8, alignItems:"center", marginBottom:8 }}>
                              <div style={{ flex:1 }}>
                                <CPTSelect value={pr.code}
                                  onChange={code=>setPendingCases(prev=>prev.map((x,j)=>j===pi?{...x,procs:x.procs.map((r,k)=>k===pri?{...r,code}:r)}:x))}
                                  style={{ width:"100%", padding:"8px 10px", border:"1px solid #e5e7eb", borderRadius:8, borderLeft:`3px solid ${CAT_COLORS[cpt?.cat]||"#e5e7eb"}` }} />
                              </div>
                              <span style={{ fontWeight:800, fontSize:14, color:"#1e3a5f", minWidth:48, textAlign:"right" }}>
                                {(cpt?.wrvu||0).toFixed(2)}
                              </span>
                              {p.procs.length>1 && (
                                <button onClick={()=>setPendingCases(prev=>prev.map((x,j)=>j===pi?{...x,procs:x.procs.filter((_,k)=>k!==pri)}:x))}
                                  style={{ background:"none", border:"none", color:"#d1d5db", cursor:"pointer", fontSize:20 }}>×</button>
                              )}
                            </div>
                          );
                        })}
                        <button onClick={()=>setPendingCases(prev=>prev.map((x,j)=>j===pi?{...x,procs:[...x.procs,{id:uid(),code:"45378"}]}:x))}
                          style={{ width:"100%", padding:"8px", background:"#f8fafc", border:"1px dashed #cbd5e1", borderRadius:6, cursor:"pointer", color:"#64748b", fontSize:13, fontWeight:600 }}>
                          + Add Procedure
                        </button>
                      </div>
                    ))}
                    <button onClick={confirmPending}
                      style={{ width:"100%", padding:13, background:"#059669", color:"white", border:"none", borderRadius:8, fontWeight:700, fontSize:16, cursor:"pointer" }}>
                      ✅ Add {pendingCases.filter(p=>p.selected).length} Case(s) to Log
                    </button>
                  </div>
                )}
              </>
            )}

            {/* ══════════ MONTHLY SUMMARY ══════════ */}
            {tab==="summary" && (
              <>
                {monthKeys.length===0 ? (
                  <div style={{ textAlign:"center", padding:"40px 20px", color:"#9ca3af", background:"white", borderRadius:12 }}>
                    <div style={{ fontSize:48 }}>📊</div>
                    <p>No data yet. Start logging cases to see monthly summaries.</p>
                  </div>
                ) : (
                  <>
                    <div style={{ background:"white", borderRadius:12, padding:18, marginBottom:14, boxShadow:"0 1px 4px rgba(0,0,0,.07)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div>
                        <div style={{ fontSize:11, fontWeight:700, color:"#6b7280" }}>ALL-TIME TOTAL</div>
                        <div style={{ fontSize:28, fontWeight:900, color:"#1e3a5f" }}>{grandTotal.toFixed(2)} <span style={{ fontSize:13, fontWeight:500, color:"#6b7280" }}>wRVU</span></div>
                        <div style={{ fontSize:12, color:"#9ca3af" }}>{cases.length} cases · {allProcs.length} procedures</div>
                      </div>
                      <div style={{ textAlign:"right" }}>
                        <div style={{ fontSize:11, fontWeight:700, color:"#6b7280" }}>AVG / MONTH</div>
                        <div style={{ fontSize:24, fontWeight:700, color:"#2563eb" }}>{(grandTotal/monthKeys.length).toFixed(1)}</div>
                      </div>
                    </div>

                    {monthKeys.map(mk=>{
                      const mCases=byMonth[mk];
                      const mProcs=mCases.flatMap(c=>c.procs.map(p=>{const cpt=CPT_DATA.find(x=>x.code===p.code);return {...p,cat:cpt?.cat||"?",wrvu:cpt?.wrvu||0};}));
                      const total=mProcs.reduce((s,p)=>s+p.wrvu,0);
                      const byCat={};
                      mProcs.forEach(p=>{byCat[p.cat]=(byCat[p.cat]||0)+p.wrvu;});
                      const expanded=expandedMonths[mk]!==false;
                      return (
                        <div key={mk} style={{ background:"white", borderRadius:12, marginBottom:12, boxShadow:"0 1px 4px rgba(0,0,0,.07)", overflow:"hidden" }}>
                          <div onClick={()=>setExpanded(prev=>({...prev,[mk]:!expanded}))}
                            style={{ padding:"14px 18px", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:expanded?"1px solid #f1f5f9":"none" }}>
                            <div>
                              <span style={{ fontWeight:800, fontSize:17 }}>{monthLabel(mk)}</span>
                              <span style={{ marginLeft:10, color:"#9ca3af", fontSize:12 }}>{mCases.length} cases · {mProcs.length} procs</span>
                            </div>
                            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                              <span style={{ fontSize:22, fontWeight:900, color:"#1e3a5f" }}>{total.toFixed(2)}</span>
                              <span style={{ color:"#9ca3af", fontSize:18 }}>{expanded?"▲":"▼"}</span>
                            </div>
                          </div>
                          {expanded && (
                            <>
                              <div style={{ display:"flex", gap:10, padding:"10px 18px", background:"#f8fafc", flexWrap:"wrap" }}>
                                {Object.entries(byCat).map(([cat,w])=>(
                                  <div key={cat} style={{ padding:"7px 12px", borderRadius:8, background:CAT_BG[cat], borderLeft:`3px solid ${CAT_COLORS[cat]}` }}>
                                    <div style={{ fontSize:10, fontWeight:700, color:CAT_COLORS[cat] }}>{cat}</div>
                                    <div style={{ fontSize:17, fontWeight:800 }}>{w.toFixed(2)}</div>
                                    <div style={{ fontSize:10, color:"#9ca3af" }}>{mProcs.filter(p=>p.cat===cat).length} procs</div>
                                  </div>
                                ))}
                              </div>
                              {[...mCases].sort((a,b)=>a.date.localeCompare(b.date)).map(c=>{
                                const cTotal=caseWRVU(c);
                                return (
                                  <div key={c.id} style={{ padding:"10px 18px", borderBottom:"1px solid #f8fafc" }}>
                                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                                      <div>
                                        <span style={{ fontWeight:600, fontSize:13 }}>{c.patient||"—"}</span>
                                        <span style={{ marginLeft:8, color:"#9ca3af", fontSize:11 }}>{c.date}</span>
                                        {c.note && <div style={{ color:"#9ca3af", fontSize:11 }}>{c.note}</div>}
                                      </div>
                                      <span style={{ fontWeight:800, color:"#1e3a5f", fontSize:14 }}>{cTotal.toFixed(2)}</span>
                                    </div>
                                    <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                                      {c.procs.map(p=>{
                                        const cpt=CPT_DATA.find(x=>x.code===p.code);
                                        return cpt?(
                                          <span key={p.id} style={{ background:CAT_BG[cpt.cat], color:CAT_COLORS[cpt.cat], padding:"2px 8px", borderRadius:10, fontSize:11, fontWeight:600 }}>
                                            {cpt.code} · {cpt.wrvu.toFixed(2)}
                                          </span>
                                        ):null;
                                      })}
                                    </div>
                                  </div>
                                );
                              })}
                              <div style={{ background:"#eff6ff", padding:"10px 18px", display:"flex", justifyContent:"space-between" }}>
                                <span style={{ fontWeight:700, color:"#1e40af" }}>Monthly Total</span>
                                <span style={{ fontWeight:900, color:"#1e3a5f", fontSize:16 }}>{total.toFixed(2)} wRVU</span>
                              </div>
                            </>
                          )}
                        </div>
                      );
                    })}
                  </>
                )}
              </>
            )}

            {/* ══════════ CPT REFERENCE ══════════ */}
            {tab==="codes" && (
              <>
                {["EGD","Colonoscopy","ERCP"].map(cat=>(
                  <div key={cat} style={{ background:"white", borderRadius:12, marginBottom:12, overflow:"hidden", boxShadow:"0 1px 4px rgba(0,0,0,.07)" }}>
                    <div style={{ background:CAT_COLORS[cat], padding:"11px 16px" }}>
                      <h3 style={{ margin:0, color:"white", fontSize:15, fontWeight:800 }}>{cat}</h3>
                    </div>
                    <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                      <thead>
                        <tr style={{ background:"#f8fafc" }}>
                          {["CPT","Description","wRVU"].map(h=>(
                            <th key={h} style={{ padding:"8px 12px", textAlign:"left", fontSize:11, fontWeight:700, color:"#6b7280", borderBottom:"1px solid #e5e7eb" }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {CPT_DATA.filter(c=>c.cat===cat).map((c,i)=>(
                          <tr key={c.code} style={{ borderBottom:"1px solid #f1f5f9", background:i%2===0?"white":"#fafafa" }}>
                            <td style={{ padding:"9px 12px", fontFamily:"monospace", fontWeight:700, color:CAT_COLORS[cat] }}>{c.code}</td>
                            <td style={{ padding:"9px 12px", fontSize:12 }}>{c.desc}</td>
                            <td style={{ padding:"9px 12px", fontWeight:800, fontSize:15, color:"#1e3a5f" }}>{c.wrvu.toFixed(2)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                ))}
                <div style={{ background:"#fef3c7", border:"1px solid #fcd34d", borderRadius:10, padding:"12px 14px", fontSize:12, color:"#78350f", lineHeight:1.6 }}>
                  <strong>⚠️ Disclaimer:</strong> wRVU values reflect the 2026 CMS Physician Fee Schedule. Values may differ by payer, site of service (ASC vs hospital), and locality. Always verify with your billing department and cms.gov.
                </div>
              </>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
